# ==============================================================================
# Pre-Loaded Dataset File Registry
# Maps logical dataset names to file paths and parsing parameters.
# Reference: Addendum Sections B.1–B.6
# ==============================================================================

datasets:

  # ---- B.1 Price Data ----
  dam_prices_entsoe:
    file: "RO_day_ahead_prices_ENTSOE.csv"
    encoding: "utf-8"
    separator: ","
    decimal: "."
    index_col: "Interval_Start_EET"
    parse_dates: true
    module: M1
    columns:
      price: "Value [EUR/MWh]"

  spot_backcast_montel:
    file: "RO_Price_Spot_EUR_MWh_Power2Sim_H_Backcast_MONTEL.csv"
    encoding: "utf-8"
    separator: ","
    decimal: "."
    index_col: "Interval_Start_EET"
    parse_dates: true
    module: M1
    columns:
      price: "RO Price Spot EUR/MWh Power2Sim H Backcast [EUR/MWh]"

  imbalance_prices_entsoe:
    file: "RO_imbalance_prices_ENTSOE.csv"
    encoding: "utf-8"
    separator: ","
    decimal: "."
    index_col: "Interval_Start_EET"
    parse_dates: true
    module: M5
    columns:
      long: "Long [EUR/MWh]"
      short: "Short [EUR/MWh]"

  imbalance_prices_bal_serv:
    file: "RO_imbalance_prices_NA_BAL_SERV.csv"
    encoding: "utf-8"
    separator: ","
    decimal: "."
    index_col: "period_startAt"
    parse_dates: true
    module: M5
    note: "15-min, RON, positive/negative direction split"

  idm_nexte:
    file: "RO_EMWSH_QH_DATA_SET_2_IDM_IDCT_Price_Vol_V1_NEXTE.csv"
    encoding: "cp1252"
    separator: ";"
    decimal: ","
    parse_dates: false
    module: M1
    note: "Date in DD.MM.YYYY format; 15-min resolution; 26 columns"

  # ---- B.2 Generation & Fundamental Data ----
  generation_entsoe:
    file: "RO_generation_ENTSOE.csv"
    encoding: "utf-8"
    separator: ","
    decimal: "."
    index_col: "Interval_Start_EET"
    parse_dates: true
    module: M3

  generation_forecast_entsoe:
    file: "RO_generation_forecast_ENTSOE.csv"
    encoding: "utf-8"
    separator: ","
    decimal: "."
    index_col: "Interval_Start_EET"
    parse_dates: true
    module: M3

  generation_import_entsoe:
    file: "RO_generation_import_ENTSOE.csv"
    encoding: "utf-8"
    separator: ","
    decimal: "."
    index_col: "Interval_Start_EET"
    parse_dates: true
    module: M3
    note: "26 columns — combined generation + import; multi-level header"

  load_entsoe:
    file: "RO_load_ENTSOE.csv"
    encoding: "utf-8"
    separator: ","
    decimal: "."
    index_col: "Interval_Start_EET"
    parse_dates: true
    module: M3
    columns:
      load: "Actual Load [MW]"

  load_forecast_entsoe:
    file: "RO_load_forecast_ENTSOE.csv"
    encoding: "utf-8"
    separator: ","
    decimal: "."
    index_col: "Interval_Start_EET"
    parse_dates: true
    module: M3
    columns:
      forecast: "Forecasted Load [MW]"

  load_and_forecast_entsoe:
    file: "RO_load_and_forecast_ENTSOE.csv"
    encoding: "utf-8"
    separator: ","
    decimal: "."
    index_col: "Interval_Start_EET"
    parse_dates: true
    module: M3

  wind_solar_forecast_entsoe:
    file: "RO_wind_and_solar_forecast_ENTSOE.csv"
    encoding: "utf-8"
    separator: ","
    decimal: "."
    index_col: "Interval_Start_EET"
    parse_dates: true
    module: M3

  intraday_wind_solar_forecast_entsoe:
    file: "RO_intraday_wind_and_solar_forecast_ENTSOE.csv"
    encoding: "utf-8"
    separator: ","
    decimal: "."
    index_col: "Interval_Start_EET"
    parse_dates: true
    module: M3

  residual_load_montel:
    file: "RO_Residual_Load_MWh_h_15min_Backcast_MONTEL.csv"
    encoding: "utf-8"
    separator: ","
    decimal: "."
    skiprows: 3
    index_col: 0
    parse_dates: true
    module: M3
    note: "First 3 rows are blank/header metadata; index col is 'date'"

  # ---- B.3 Cross-Border Flow Data ----
  imports_entsoe:
    file: "RO_import_ENTSOE.csv"
    encoding: "utf-8"
    separator: ","
    decimal: "."
    index_col: "Interval_Start_EET"
    parse_dates: true
    module: M3
    columns:
      bg: "BG [MW]"
      hu: "HU [MW]"
      rs: "RS [MW]"
      ua: "UA [MW]"
      total: "sum [MW]"

  # ---- B.4 Imbalance & Balancing Volume Data ----
  imbalance_volumes_entsoe:
    file: "RO_imbalance_volumes_ENTSOE.csv"
    encoding: "utf-8"
    separator: ","
    decimal: "."
    index_col: "Interval_Start_EET"
    parse_dates: true
    module: M5
    columns:
      volume: "Imbalance Volume [MWh]"

  imbalance_totalvolumes_bal_serv:
    file: "RO_imbalance_totalvolumes_NA_BAL_SERV.csv"
    encoding: "utf-8"
    separator: ","
    decimal: "."
    index_col: "period_startAt"
    parse_dates: true
    module: M5
    note: "15-min, MW, surplus/deficit direction split"

  imbalance_volume_montel:
    file: "RO_Volume_Imbalance_Net_MWh_15min_Actual_MONTEL.csv"
    encoding: "utf-8"
    separator: ";"
    decimal: "."
    skiprows: 3
    index_col: 0
    parse_dates: true
    module: M5
    note: "First 3 rows are blank/header; index col is 'date'"

  # ---- B.5 Forward Price & Scenario Data ----
  aurora_forecast:
    file: "RO_EMWSF_Monthly_Aurora_Oct25_ROU_Nominal_AURORA.csv"
    encoding: "cp1252"
    separator: ";"
    decimal: ","
    parse_dates: false
    module: [M1, M6, M7]
    note: "Semicolon-delimited, European decimal. 2026–2050+."

  sensitivity_scenarios:
    file: "timeseries_RO_Sensitivity_Spot_EUR_MWh_H_Scenario.csv"
    encoding: "utf-8"
    separator: ","
    decimal: "."
    header: [0, 1, 2]
    index_col: 0
    parse_dates: true
    module: M6
    note: "Multi-level header: curve name / blank / scenario MW shift. Index = date."

  # ---- B.6 FX Data ----
  fx_eur_ron:
    file: "EURO_RON_Conversion_rate_01_01_2009_26_02_2026.csv"
    encoding: "utf-8"
    separator: ";"
    decimal: ","
    parse_dates: false
    module: M2
    note: "Date in DD.MM.YYYY format; single price column"
